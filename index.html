<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed GRWM Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --cream: #fdfaf5; --brown: #a89078; --pink: #fbc4ab; --dark: #4a443f; }
        body { font-family: 'Kanit', sans-serif; background: var(--cream); color: var(--dark); display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; min-height: 100vh; }

        /* หน้าจอเริ่มต้นที่แก้ปัญหาเปิดไม่ได้ */
        #overlay { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { padding: 20px 60px; font-size: 24px; font-family: 'Itim'; background: var(--brown); color: white; border: none; border-radius: 50px; cursor: pointer; }

        .planner-paper { background: white; width: 100%; max-width: 450px; border-radius: 35px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid #eee; }
        h1 { font-family: 'Itim'; color: var(--brown); text-align: center; margin-bottom: 15px; }

        .sleep-advice { background: #fff5f2; padding: 15px; border-radius: 20px; margin-bottom: 20px; text-align: center; border: 1px dashed var(--pink); }
        .sleep-time { font-size: 18px; font-weight: bold; color: var(--brown); font-family: 'Itim'; }

        .timeline { background: #fffcf9; padding: 15px; border-radius: 25px; border: 1px solid #f2f2f2; margin-bottom: 20px; }
        .time-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border-bottom: 1px solid #f9f9f9; padding-bottom: 5px; }
        .time-row input { border: none; background: transparent; outline: none; font-family: 'Kanit'; font-size: 14px; }
        .time-row input[type="time"] { font-weight: bold; color: var(--brown); width: 80px; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .save-btn { background: var(--brown); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-family: 'Itim'; font-size: 18px; cursor: pointer; }
        .cam-btn { background: var(--pink); color: #7a5c56; border: none; padding: 10px 20px; border-radius: 50px; font-family: 'Itim'; cursor: pointer; margin-bottom: 15px; }

        #camera-area { width: 100%; height: 180px; background: #eee; border-radius: 25px; margin-bottom: 10px; overflow: hidden; position: relative; }
        video, img#photo-result { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="overlay">
    <h2 style="font-family:'Itim'; color:var(--brown);">แตะเพื่อเริ่มจดแพลนเนอร์ ✨</h2>
    <button class="start-btn" onclick="startApp()">START</button>
</div>

<div class="planner-paper" id="capture-area">
    <h1>Morning Routine</h1>
    
    <div class="sleep-advice">
        <div style="font-size: 14px;">🌙 ควรนอนตอนกี่โมง?</div>
        <div id="sleep-result" class="sleep-time">กรุณาเลือกเวลาตื่น...</div>
    </div>

    <div id="camera-area">
        <video id="video" autoplay playsinline></video>
        <img id="photo-result" style="display:none; position:absolute; top:0; left:0;">
    </div>
    <center><button class="cam-btn" onclick="takeSnap()">📸 ถ่ายรูป</button></center>

    <div class="timeline" id="rows-container"></div>
</div>

<button class="save-btn" onclick="doPrint()">บันทึกรูปภาพ ✨</button>

<script>
    let audioCtx;

    // สร้างเสียงสดๆ ไม่ต้องโหลดไฟล์
    function playBeep(freq, dur) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    const schedules = [
        { t: "06:00", d: "Wake up & Skincare 🧴" },
        { t: "07:30", d: "Ovaltine & Breakfast 🥤" },
        { t: "09:00", d: "Start Studying" },
        { t: "12:00", d: "Lunch Time 🍱" },
        { t: "22:00", d: "Night Routine 📖" }
    ];

    const container = document.getElementById('rows-container');
    schedules.forEach((item, index) => {
        container.innerHTML += `
            <div class="time-row">
                <input type="time" value="${item.t}" onchange="updateSleep(this.value); playBeep(500, 0.1);">
                <input type="text" value="${item.d}" oninput="playBeep(150, 0.05);">
            </div>
        `;
    });

    function updateSleep(wakeTime) {
        const [h, m] = wakeTime.split(':').map(Number);
        const d = new Date(); d.setHours(h, m);
        const sleep = new Date(d.getTime() - (7.5 * 60 * 60 * 1000));
        document.getElementById('sleep-result').innerText = `ถ้าตื่น ${wakeTime} ควรนอนตอน ${sleep.getHours().toString().padStart(2,'0')}:${sleep.getMinutes().toString().padStart(2,'0')} น.`;
    }

    function startApp() {
        document.getElementById('overlay').style.display = 'none';
        updateSleep("06:00");
        initCam();
    }

    async function initCam() {
        const video = document.getElementById('video');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        } catch (e) { console.log("No Camera"); }
    }

    function takeSnap() {
        playBeep(800, 0.2);
        const video = document.getElementById('video');
        const img = document.getElementById('photo-result');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        img.src = canvas.toDataURL('image/png');
        img.style.display = 'block';
    }

    function doPrint() {
        playBeep(400, 0.5);
        html2canvas(document.getElementById('capture-area')).then(canvas => {
            const a = document.createElement('a');
            a.download = 'MyPlanner.png';
            a.href = canvas.toDataURL();
            a.click();
        });
    }
</script>
</body>
</html>
