<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRWM 06:00 AM Morning Vibe</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --soft-cream: #f9f6f2; --aesthetic-brown: #a89078; --misty-rose: #eac8c1; --text-dark: #4a443f; }
        body { font-family: 'Kanit', sans-serif; background: var(--soft-cream); color: var(--text-dark); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; transition: 0.5s; }

        /* 🎀 GRWM Start Overlay */
        #overlay { position: fixed; inset: 0; background: #fff; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .start-btn { padding: 18px 50px; font-size: 22px; font-family: 'Itim'; background: var(--aesthetic-brown); color: white; border: none; border-radius: 100px; cursor: pointer; letter-spacing: 1px; box-shadow: 0 10px 25px rgba(168, 144, 120, 0.2); }
        .start-btn:hover { background: #8e7964; transform: scale(1.02); }

        /* 📜 Aesthetic Planner */
        .planner-paper { background: white; width: 100%; max-width: 480px; border-radius: 35px; padding: 35px; box-shadow: 0 30px 60px rgba(0,0,0,0.03); border: 1px solid rgba(168, 144, 120, 0.1); position: relative; background-image: radial-gradient(#d1d1d1 0.5px, transparent 0.5px); background-size: 20px 20px; }
        h1 { font-family: 'Itim'; color: var(--aesthetic-brown); text-align: center; font-size: 28px; margin-bottom: 25px; letter-spacing: 1px; }

        /* 📸 Snapshot ASMR Area */
        .snap-section { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; align-items: center; }
        #camera-box { width: 100%; height: 200px; background: #fdfdfd; border-radius: 25px; overflow: hidden; border: 1.5px solid var(--misty-rose); position: relative; }
        #video, #photo-result { width: 100%; height: 100%; object-fit: cover; filter: sepia(0.1) contrast(1.05); }
        #photo-result { display: none; position: absolute; top:0; left:0; }
        .poem-box { font-family: 'Itim'; font-size: 16px; color: #7a736d; text-align: center; font-style: italic; background: #faf8f6; padding: 15px; border-radius: 20px; width: 100%; box-sizing: border-box; }

        /* ⏰ GRWM Timeline (Editable) */
        .box { background: rgba(255,255,255,0.6); padding: 20px; border-radius: 25px; margin-bottom: 20px; border: 1px solid #f0f0f0; }
        .time-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .time-row input[type="time"] { border: none; background: #f4efeb; padding: 6px 12px; border-radius: 12px; font-family: 'Kanit'; font-size: 14px; color: var(--aesthetic-brown); font-weight: bold; }
        .time-row input[type="text"] { flex: 1; border: none; border-bottom: 1px solid #eee; outline: none; background: transparent; font-size: 15px; color: #555; }

        /* 🎵 Aesthetic Music Player */
        .music-player { display: flex; gap: 12px; margin: 20px 0; background: white; padding: 10px 20px; border-radius: 100px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .mood-btn { border: none; background: none; font-size: 20px; cursor: pointer; filter: grayscale(1); transition: 0.3s; }
        .mood-btn.active { filter: grayscale(0) scale(1.2); }

        /* 🖨️ Minimalist Save Button */
        .save-btn { background: var(--aesthetic-brown); color: white; border: none; padding: 18px 45px; border-radius: 100px; font-family: 'Itim'; font-size: 20px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .save-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div id="overlay">
    <div style="font-size: 40px; margin-bottom: 20px;">☕</div>
    <h2 style="font-family:'Itim'; color:var(--aesthetic-brown); margin-bottom:30px;">Get Ready with Me</h2>
    <button class="start-btn sfx-soft" onclick="startApp()">Start My 06:00 AM</button>
</div>

<div class="planner-paper" id="capture-area">
    <h1>Morning Routine</h1>
    
    <div class="snap-section">
        <div id="camera-box">
            <video id="video" autoplay playsinline></video>
            <canvas id="hidden-canvas" style="display:none;"></canvas>
            <img id="photo-result">
        </div>
        <div class="poem-box">
            "ตื่นมาในเช้าที่แสนนุ่มนวล<br>เริ่มต้นก้าวแรกอย่างตั้งใจ<br>วันนี้คือวันแห่งความสุขของคุณ"
        </div>
        <button onclick="takeSnap()" class="sfx-camera" style="border:none; background:var(--misty-rose); color:#7a5c56; border-radius:50px; padding:8px 20px; font-family:'Itim'; cursor:pointer; font-size:14px;">📸 Snapshot</button>
    </div>

    <div class="box">
        <div class="time-row">
            <input type="time" value="06:00" class="sfx-soft">
            <input type="text" value="Wake up & Skincare 🧴" class="sfx-asmr">
        </div>
        <div class="time-row">
            <input type="time" value="07:00" class="sfx-soft">
            <input type="text" value="Coffee or Ovaltine Time ☕" class="sfx-asmr">
        </div>
        <div class="time-row">
            <input type="time" value="08:00" class="sfx-soft">
            <input type="text" placeholder="Start Daily Journey" class="sfx-asmr">
        </div>
        <div class="time-row">
            <input type="time" value="12:00" class="sfx-soft">
            <input type="text" placeholder="Lunch Break" class="sfx-asmr">
        </div>
    </div>

    <div style="text-align: center; color: var(--aesthetic-brown); font-family: 'Itim'; font-size: 14px; opacity: 0.7;">
        — be kind to yourself today —
    </div>
</div>

<div class="music-player">
    <button class="mood-btn sfx-soft active" onclick="playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3', this)">📻</button>
    <button class="mood-btn sfx-soft" onclick="playMusic('https://actions.google.com/sounds/v1/water/rain_on_roof.ogg', this)">🌧️</button>
    <button class="mood-btn sfx-soft" onclick="playMusic('https://actions.google.com/sounds/v1/nature_and_animals/birds_singing.ogg', this)">🍃</button>
    <button class="mood-btn sfx-soft" onclick="toggleMute()">🔇</button>
</div>

<button class="save-btn sfx-save" onclick="doPrint()">Save Daily Vibe ✨</button>

<audio id="bg-music" loop></audio>
<audio id="soft-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio> <audio id="asmr-type" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio> <audio id="camera-shutter" src="https://assets.mixkit.co/active_storage/sfx/544/544-preview.mp3"></audio>
<audio id="save-sfx" src="https://assets.mixkit.co/active_storage/sfx/2042/2042-preview.mp3"></audio>

<script>
    const bgMusic = document.getElementById('bg-music');
    const softClick = document.getElementById('soft-click');
    const asmrType = document.getElementById('asmr-type');
    const cameraSfx = document.getElementById('camera-shutter');
    const saveSfx = document.getElementById('save-sfx');

    function startApp() {
        document.getElementById('overlay').style.opacity = '0';
        document.getElementById('overlay').style.transform = 'scale(1.1)';
        setTimeout(() => document.getElementById('overlay').style.display = 'none', 800);
        initCamera();
        playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3', document.querySelector('.mood-btn'));
    }

    function playMusic(src, btn) {
        bgMusic.src = src;
        bgMusic.volume = 0.3;
        bgMusic.play();
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
    }

    function toggleMute() { bgMusic.paused ? bgMusic.play() : bgMusic.pause(); }

    // ASMR Interaction
    document.addEventListener('click', (e) => {
        if(e.target.classList.contains('sfx-soft')) {
            softClick.currentTime = 0;
            softClick.volume = 0.2;
            softClick.play();
        }
    });

    document.addEventListener('input', (e) => {
        if(e.target.classList.contains('sfx-asmr')) {
            asmrType.currentTime = 0;
            asmrType.volume = 0.15;
            asmrType.play();
        }
    });

    // Camera
    const video = document.getElementById('video');
    const photoImg = document.getElementById('photo-result');
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
        } catch (err) { console.log("Camera access denied"); }
    }

    function takeSnap() {
        cameraSfx.play();
        const canvas = document.getElementById('hidden-canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        photoImg.src = canvas.toDataURL('image/png');
        photoImg.style.display = 'block';
    }

    function doPrint() {
        saveSfx.play();
        const area = document.getElementById('capture-area');
        html2canvas(area, { useCORS: true, scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'GRWM-Morning.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }
</script>
</body>
</html>
