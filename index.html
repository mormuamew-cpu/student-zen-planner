<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Student Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Mitr:wght@300&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #fdfaf5;
            --accent-green: #9fb8ad;
            --soft-pink: #f4dada;
            --text-main: #5a5a5a;
        }
        body {
            font-family: 'Itim', cursive;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: var(--text-main);
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { color: var(--accent-green); margin-bottom: 20px; }
        textarea {
            width: 100%;
            height: 150px;
            border: 2px dashed var(--soft-pink);
            border-radius: 15px;
            padding: 15px;
            font-family: 'Itim', cursive;
            font-size: 18px;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }
        .btn-save {
            margin-top: 20px;
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-save:hover { background-color: #8da398; transform: scale(1.05); }
        
        /* สไตล์ส่วนดนตรีและคำคม */
        .safe-zone-panel {
            position: fixed; bottom: 20px; left: 20px; z-index: 1000;
            background: rgba(255,255,255,0.9); padding: 15px; border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1); backdrop-filter: blur(10px);
            width: 280px; text-align: left;
        }
    </style>
</head>
<body>

<div class="container" id="planner-box">
    <h1>✿ วันนี้เป็นยังไงบ้าง? ✿</h1>
    <p>เขียนบันทึกความรู้สึก หรือแผนของวันนี้ลงไปนะ</p>
    <textarea placeholder="พิมพ์ตรงนี้ได้เลย..."></textarea>
    <br>
    <button class="btn-save" onclick="saveAsImage()">📸 บันทึกเป็นรูปภาพ</button>
</div>

<div class="safe-zone-panel">
    <div id="quote-box" style="background: #fff5f7; padding: 12px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid #ffb7c5;">
        <p id="quote-text" style="margin: 0; font-size: 14px;">"วันนี้คุณเก่งมากแล้วนะ พักผ่อนบ้างนะคนดี"</p>
        <button onclick="randomQuote()" style="margin-top: 8px; background: #ffb7c5; color: white; border: none; padding: 4px 10px; border-radius: 10px; font-size: 11px; cursor: pointer;">✨ ขอคำให้กำลังใจ</button>
    </div>
    <div style="font-size: 13px; font-weight: bold; margin-bottom: 8px;">🎧 เลือกบรรยากาศ:</div>
    <select id="musicSelect" onchange="changeMusic()" style="width: 100%; padding: 8px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; cursor: pointer;">
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">🎵 Lofi สบายๆ</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">🎹 เปียโนนุ่มนวล</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3">🌊 เสียงคลื่นทะเล</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3">🍃 เสียงนกในป่า</option>
    </select>
    <audio id="myAudio" controls loop style="height: 30px; width: 100%;">
        <source id="audioSource" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    // ฟังก์ชันบันทึกรูป
    function saveAsImage() {
        const element = document.getElementById("planner-box");
        html2canvas(element).then(canvas => {
            const link = document.createElement("a");
            link.download = "my-zen-planner.png";
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    // ฟังก์ชันคำคม
    const quotes = ["วันนี้เธอทำเต็มที่แล้วนะ", "เหนื่อยก็พักนะ พรุ่งนี้ค่อยเริ่มใหม่", "เก่งมากที่ผ่านวันนี้มาได้!", "อย่าลืมใจดีกับตัวเองนะ", "พักหายใจลึกๆ สักนิดนะ"];
    function randomQuote() {
        const textElement = document.getElementById('quote-text');
        const randomIndex = Math.floor(Math.random() * quotes.length);
        textElement.innerText = '"' + quotes[randomIndex] + '"';
    }

    // ฟังก์ชันเปลี่ยนเพลง
    function changeMusic() {
        var audio = document.getElementById('myAudio');
        var source = document.getElementById('audioSource');
        var select = document.getElementById('musicSelect');
        source.src = select.value;
        audio.load();
        audio.play();
    }
</script>

</body>
</html>
